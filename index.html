  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    /* ===== CSS Variables: Dark theme (default) ===== */
    :root {
      --bg-1: #020617;
      --bg-2: #0f172a;
      --ink: #e2e8f0;
      --muted: #94a3b8;
      --card: #0b1220cc;
      --surface: #0b1220;
      --surface-soft: #0b1220b3;
      --surface-strong: #0f172acc;
      --line: #1e293b;
      --accent: #06b6d4;
      --button-ink: #001018;
      --summary-ink: #dbeafe;
      --shadow: #00000033;
      --glow-a: #0891b233;
      --glow-b: #f9731626;
      --good: #22c55e;
      --cold: #38bdf8;
      --hot: #f97316;
    }

    /* ===== CSS Variables: Light theme override ===== */
    body[data-theme="light"] {
      --bg-1: #fffaf2;
      --bg-2: #eaf2ff;
      --ink: #0f172a;
      --muted: #475569;
      --card: #ffffffd9;
      --surface: #ffffff;
      --surface-soft: #ffffffcc;
      --surface-strong: #eff6ff;
      --line: #bfd0e3;
      --accent: #0f766e;
      --button-ink: #f8fafc;
      --summary-ink: #0f172a;
      --shadow: #94a3b833;
      --glow-a: #22c55e1f;
      --glow-b: #f59e0b26;
      --good: #16a34a;
      --cold: #3b82f6;
      --hot: #ea580c;
    }

    /* ===== Global reset and body layout ===== */
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, var(--glow-a) 0 18%, transparent 19%),
        radial-gradient(circle at 85% 10%, var(--glow-b) 0 14%, transparent 15%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding: 32px 18px;
      transition: background-color 300ms ease, color 300ms ease;
    }

    /* ===== Main container shell ===== */
    .shell {
      max-width: 980px;
      margin: 0 auto;
      animation: rise 500ms ease-out;
    }

    /* ===== Page heading and subtitle ===== */
    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
    }

    /* ===== Toolbar: buttons, city input, language selector ===== */
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 20px 0 24px;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ===== Form inputs styling ===== */
    input {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
    }

    input { min-width: 220px; }

    input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
    }

    /* ===== Button styling ===== */
    button {
      border: none;
      background: var(--accent);
      color: var(--button-ink);
      font: inherit;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 140ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    #themeToggle, #geolocate {
      padding: 10px 14px;
      min-width: auto;
      font-size: 1rem;
    }
    .state {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ===== Forecast cards grid layout ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
    }

    /* ===== Map section: wrapper, header, iframe ===== */
    .map-wrap {
      margin-top: 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface-soft);
      overflow: hidden;
      box-shadow: 0 14px 28px var(--shadow);
    }

    .map-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 0.9rem;
      border-bottom: 1px solid var(--line);
      background: var(--surface-strong);
    }

    .map {
      width: 100%;
      height: 300px;
      border: 0;
      display: block;
    }

    /* ===== Forecast day card styling ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(6px);
      opacity: 0;
      transform: translateY(6px);
      animation: cardIn 380ms ease-out forwards;
      box-shadow: 0 14px 28px var(--shadow);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .weekday {
      font-weight: 700;
      font-size: 0.93rem;
      text-transform: capitalize;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-strong);
    }

    .date {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .summary {
      margin-top: 10px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--summary-ink);
    }

    .temp {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 700;
    }

    .temp .c {
      font-size: 1.4rem;
    }

    .temp .f {
      font-size: 0.92rem;
      opacity: 0.86;
    }

    .source-pill {
      font-size: 0.75rem;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
    }

    /* ===== Temperature color classes ===== */
    .cold { color: var(--cold); }
    .warm { color: var(--good); }
    .hot { color: var(--hot); }

    /* ===== Animations: page rise-in and card entrance ===== */
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Today's card highlight and badge ===== */
    .card.is-today {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 14px 28px var(--shadow);
    }

    .today-badge {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      padding: 2px 7px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .card-emoji {
      font-size: 2.4rem;
      line-height: 1;
      padding: 10px 0 4px;
      text-align: center;
    }

    .temp-min {
      opacity: 0.55;
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* ===== Select dropdown styling ===== */
    select {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
    }

    .spacer {
      height: 32px;
    }

    /* ===== Local time display box ===== */
    .time-display {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin: 20px 0;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      box-shadow: 0 14px 28px var(--shadow);
    }

    /* ===== Related news section (Wikipedia articles) ===== */
    .news-section { margin-top: 24px; }
    .news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .news-title { font-size: 1.3rem; font-weight: 700; }
    .news-source { font-size: 0.75rem; color: var(--muted); }
    .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
    .news-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(6px);
      box-shadow: 0 14px 28px var(--shadow);
      opacity: 0;
      transform: translateY(6px);
      animation: cardIn 380ms ease-out forwards;
    }
    .news-card-title { font-weight: 700; font-size: 1rem; margin-bottom: 8px; }
    .news-card-title a { color: var(--accent); text-decoration: none; }
    .news-card-title a:hover { text-decoration: underline; }
    .news-card-snippet { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }
    .news-card-snippet mark { background: color-mix(in srgb, var(--accent) 25%, transparent); color: var(--ink); border-radius: 2px; padding: 0 2px; }
    .news-card-link { display: inline-block; margin-top: 10px; color: var(--accent); font-weight: 600; font-size: 0.85rem; text-decoration: none; }
    .news-card-link:hover { text-decoration: underline; }
    </style>
</head>

      </label>
      <label class="field" for="language">
        <span id="languageLabel">Language</span>
        <select id="language">
          <option value="en">English</option>

    <!-- ===== 7-day weather forecast card grid ===== -->

    <div class="spacer"></div>

    <!-- ===== OpenStreetMap embed showing the selected city ===== -->
    <section class="map-wrap">
      <div class="map-header">

        <span id="mapLabel">Loading...</span>
      </div>
      <iframe
        id="cityMap"
        class="map"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="City map"></iframe>
    </section>

    <!-- ===== Related news section: Wikipedia articles about the city (in selected language) ===== -->
    <section class="news-section" id="newsSection" style="display:none;">
      <div class="news-header">
        <span class="news-title" id="newsSectionTitle"></span>
        <span class="news-source" id="newsSectionSource"></span>
      </div>
      <div class="news-grid" id="newsGrid"></div>
    </section>
  </main>

      return text;
    }

    // Updates all static UI text elements to the current language
    function updateUIText() {
      document.title = t("title");
      document.querySelector("h1").textContent = t("title");
      document.querySelector(".subtitle").textContent = t("subtitle");
      reloadButton.textContent = t("refresh");
      cityLabel.textContent = t("city");
      languageLabel.textContent = t("language");
      mapHeaderLabel.textContent = t("cityMap");
      if (!cityInput.value.trim()) {
        state.textContent = t("noForecast");
      }
    }

    // Loads the saved theme (dark/light) from localStorage and applies it
    function initTheme() {
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.body.setAttribute("data-theme", savedTheme);
      updateThemeButton(savedTheme);
    }

    // Switches the theme toggle button emoji based on the active theme
    function updateThemeButton(theme) {
      themeToggle.textContent = theme === "light" ? "🌙" : "☀️";
    }

    // Toggles between dark and light theme, saving preference to localStorage
    function toggleTheme() {
      const currentTheme = document.body.getAttribute("data-theme") || "dark";
      const newTheme = currentTheme === "dark" ? "light" : "dark";
      document.body.setAttribute("data-theme", newTheme);
      localStorage.setItem("theme", newTheme);
      updateThemeButton(newTheme);
    }

    themeToggle.addEventListener("click", toggleTheme);

    // Returns a CSS class name (hot/cold/warm) based on temperature in Celsius
    function classForTemp(tempC) {
      if (tempC >= 35) return "hot";
      if (tempC <= 5) return "cold";
      return "warm";
    }

    // Formats an ISO date string into localized weekday and short date using Intl.DateTimeFormat
    function getDateParts(isoDate, timezone) {
      const date = new Date(`${isoDate}T00:00:00Z`);
      const formatter = new Intl.DateTimeFormat(currentLang === "en" ? "en-US" : currentLang, {
        weekday: "long",
        timeZone: timezone
      });
      const weekday = formatter.format(date);
      const shortFormatter = new Intl.DateTimeFormat(currentLang === "en" ? "en-US" : currentLang, {
        day: "2-digit",
        month: "short",
        year: "numeric",
        timeZone: timezone
      });
      const shortDate = shortFormatter.format(date);
      return { weekday, shortDate };
    }

    // Builds a forecast item object with Celsius/Fahrenheit conversions
    function toForecastItem(dateIso, tempMaxC, tempMinC, summary, emoji) {
      return {
        date: dateIso,
        temperatureC: Math.round(tempMaxC),
        temperatureCMax: Math.round(tempMaxC),
        temperatureCMin: Math.round(tempMinC),
        temperatureFMax: Math.round((tempMaxC * 9 / 5) + 32),
        temperatureFMin: Math.round((tempMinC * 9 / 5) + 32),
        summary,
        emoji
      };
    }

    // Translates a WMO weather code number into a human-readable description
    function mapWeatherCode(code) {
      return translations[currentLang]?.weatherCodes?.[code] || translations["en"]?.weatherCodes?.[code] || "Unknown";
    }

    // Maps a WMO weather code to an appropriate emoji icon
    function weatherEmoji(code) {
      if (code === 0) return "☀️";
      if (code === 1 || code === 2) return "🌤️";
      if (code === 3) return "☁️";
      if (code === 45 || code === 48) return "🌫️";
      if (code >= 51 && code <= 55) return "🌦️";
      if (code >= 61 && code <= 65) return "🌧️";
      if (code >= 71 && code <= 75) return "❄️";
      if (code >= 80 && code <= 82) return "🌦️";
      if (code === 85 || code === 86) return "🌨️";
      if (code >= 95) return "⛈️";
      return "🌡️";
    }

    // Renders the forecast cards into the grid from an array of forecast items
    function draw(items) {
      forecastContainer.innerHTML = "";

      items.forEach((item, i) => {
        const card = document.createElement("article");
        card.className = "card";
        if (i === 0) card.classList.add("is-today");
        card.style.animationDelay = `${i * 70}ms`;

        const tone = classForTemp(item.temperatureC);
        const { weekday, shortDate } = getDateParts(item.date, currentTimezone);
        const todayBadge = i === 0 ? `<span class="today-badge">${t("today")}</span>` : "";

        card.innerHTML = `
          <div class="card-top">
            <span class="weekday">${weekday} ${todayBadge}</span>
          </div>
          <div class="card-emoji">${item.emoji}</div>
          <div class="date">${shortDate}</div>
          <div class="summary">${item.summary ?? "No data"}</div>
          <div class="temp ${tone}">
            <span class="c">${item.temperatureCMax}° <span class="temp-min">/ ${item.temperatureCMin}°C</span></span>
            <span class="f">${item.temperatureFMax} / ${item.temperatureFMin} °F</span>
          </div>
        `;

        forecastContainer.appendChild(card);
      });
    }

    // Updates the local time display using the city's timezone (runs every second)
    function updateTimeDisplay() {
      const now = new Date();
      const timeFormatter = new Intl.DateTimeFormat(currentLang === "en" ? "en-US" : currentLang, {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        timeZone: currentTimezone
      });
      const time = timeFormatter.format(now);
      timeDisplay.textContent = `⏰ ${time} (${currentTimezone})`;
    }

    setInterval(updateTimeDisplay, 1000);

    // Updates the OpenStreetMap iframe to center on the given coordinates with a marker
    function updateMap(latitude, longitude, label) {
      const delta = 0.16;
      const minLon = (longitude - delta).toFixed(4);
      const minLat = (latitude - delta).toFixed(4);
      const maxLon = (longitude + delta).toFixed(4);
      const maxLat = (latitude + delta).toFixed(4);
      cityMap.src = `https://www.openstreetmap.org/export/embed.html?bbox=${minLon}%2C${minLat}%2C${maxLon}%2C${maxLat}&layer=mapnik&marker=${latitude.toFixed(4)}%2C${longitude.toFixed(4)}`;
      mapLabel.textContent = label;
    }

    // Geocodes a city name via Open-Meteo API, then fetches its 7-day weather forecast
    async function fetchRealByCity(city) {
      const geocodeUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=${currentLang}&format=json`;
      const geocodeResponse = await fetch(geocodeUrl);
      if (!geocodeResponse.ok) throw new Error(`Geocoding HTTP ${geocodeResponse.status}`);

      const geocodeData = await geocodeResponse.json();
      const place = geocodeData?.results?.[0];
      if (!place) throw new Error("City not found");

      const forecastUrl = `https://api.open-meteo.com/v1/forecast?latitude=${place.latitude.toFixed(4)}&longitude=${place.longitude.toFixed(4)}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`;
      const forecastResponse = await fetch(forecastUrl);
      if (!forecastResponse.ok) throw new Error(`Forecast HTTP ${forecastResponse.status}`);

      const data = await forecastResponse.json();
      const daily = data?.daily;
      if (!daily) throw new Error("No daily data");

      currentTimezone = data?.timezone || "UTC";

      const dayCount = Math.min(
        daily.time?.length || 0,
        daily.weather_code?.length || 0,
        daily.temperature_2m_max?.length || 0,
        daily.temperature_2m_min?.length || 0
      );

      const forecast = Array.from({ length: dayCount }, (_, i) => {
        return toForecastItem(
          daily.time[i],
          daily.temperature_2m_max[i],
          daily.temperature_2m_min[i],
          mapWeatherCode(daily.weather_code[i]),
          weatherEmoji(daily.weather_code[i])
        );
      });

      return { forecast, place };
    }

    // Fetches up to 6 city suggestions from the geocoding API for the autocomplete datalist
    async function fetchCitySuggestions(query) {
      const geocodeUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=${currentLang}&format=json`;
      const response = await fetch(geocodeUrl);
      if (!response.ok) {
        return [];
      }

      const data = await response.json();
      return data?.results ?? [];
    }

    // Populates the city input datalist with autocomplete options
    function updateCityDatalist(results) {
      cityList.innerHTML = "";
      results.forEach((place) => {
        const option = document.createElement("option");
        option.value = place.country ? `${place.name}, ${place.country}` : place.name;
        cityList.appendChild(option);
      });
    }

    // Main forecast loader: geocodes the city input, fetches weather, renders cards, map, and news
    async function loadForecast() {
      try {
        const city = cityInput.value.trim();
        if (!city) {
          state.textContent = t("noForecast");
          forecastContainer.innerHTML = "";
          return;
        }

        state.textContent = t("consulting");
        const { forecast, place } = await fetchRealByCity(city);
        draw(forecast);
        const locationLabel = place.country ? `${place.name}, ${place.country}` : place.name;
        updateMap(place.latitude, place.longitude, locationLabel);
        updateTimeDisplay();
        localStorage.setItem("lastCity", city);
        state.textContent = t("ready", { count: forecast.length });
        fetchAndDrawNews(place.name);
      } catch (error) {
        state.textContent = t("error", { error: error.message });
      }
    }

    // Loads forecast directly from latitude/longitude (used by geolocation)
    async function loadForecastByCoords(lat, lon, label) {
      try {
        state.textContent = t("consulting");
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Forecast HTTP ${res.status}`);
        const data = await res.json();
        const daily = data?.daily;
        if (!daily) throw new Error("No daily data");

        currentTimezone = data?.timezone || "UTC";

        const dayCount = Math.min(
          daily.time?.length || 0,
          daily.weather_code?.length || 0,
          daily.temperature_2m_max?.length || 0,
          daily.temperature_2m_min?.length || 0
        );
        const forecast = Array.from({ length: dayCount }, (_, i) =>
          toForecastItem(daily.time[i], daily.temperature_2m_max[i], daily.temperature_2m_min[i],
            mapWeatherCode(daily.weather_code[i]), weatherEmoji(daily.weather_code[i]))
        );
        draw(forecast);
        updateMap(lat, lon, label);
        updateTimeDisplay();
        state.textContent = t("ready", { count: forecast.length });
        fetchAndDrawNews(label);
      } catch (error) {
        state.textContent = t("error", { error: error.message });
      }
    }

    // Fetches related Wikipedia articles for the city (in the selected language) and renders news cards
    async function fetchAndDrawNews(cityName) {
      const newsSection = document.getElementById("newsSection");
      const newsGrid = document.getElementById("newsGrid");
      const newsSectionTitle = document.getElementById("newsSectionTitle");
      const newsSectionSource = document.getElementById("newsSectionSource");

      newsSection.style.display = "block";
      newsSectionTitle.textContent = t("relatedNews");
      newsSectionSource.textContent = t("poweredBy");
      newsGrid.innerHTML = "";
      const loadingP = document.createElement("p");
      loadingP.style.color = "var(--muted)";
      loadingP.textContent = t("loadingNews");
      newsGrid.appendChild(loadingP);

      try {
        const lang = currentLang;
        const url = `https://${lang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(cityName)}&format=json&origin=*&utf8=1&srlimit=5`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Wikipedia HTTP ${res.status}`);
        const data = await res.json();
        const results = data?.query?.search;

        if (!results || results.length === 0) {
          newsGrid.innerHTML = "";
          const noP = document.createElement("p");
          noP.style.color = "var(--muted)";
          noP.textContent = t("noNews");
          newsGrid.appendChild(noP);
          return;
        }

        newsGrid.innerHTML = "";
        results.forEach((article, i) => {
          const card = document.createElement("article");
          card.className = "news-card";
          card.style.animationDelay = `${i * 70}ms`;
          const articleUrl = `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(article.title.replace(/ /g, "_"))}`;

          const snippet = article.snippet
            .replace(/<span class="searchmatch">(.*?)<\/span>/g, "<mark>$1</mark>")
            .replace(/<(?!\/?mark\b)[^>]*>/g, "");

          const titleDiv = document.createElement("div");
          titleDiv.className = "news-card-title";
          const titleLink = document.createElement("a");
          titleLink.href = articleUrl;
          titleLink.target = "_blank";
          titleLink.rel = "noopener noreferrer";
          titleLink.textContent = article.title;
          titleDiv.appendChild(titleLink);

          const snippetDiv = document.createElement("div");
          snippetDiv.className = "news-card-snippet";
          snippetDiv.innerHTML = snippet + "...";

          const readMoreLink = document.createElement("a");
          readMoreLink.className = "news-card-link";
          readMoreLink.href = articleUrl;
          readMoreLink.target = "_blank";
          readMoreLink.rel = "noopener noreferrer";
          readMoreLink.textContent = t("readMore") + " \u2192";

          card.appendChild(titleDiv);
          card.appendChild(snippetDiv);
          card.appendChild(readMoreLink);
          newsGrid.appendChild(card);
        });
      } catch (err) {
        newsGrid.innerHTML = "";
        const errP = document.createElement("p");
        errP.style.color = "var(--muted)";
        errP.textContent = t("noNews");
        newsGrid.appendChild(errP);
      }
    }

    // ===== Event listener: Geolocation button – detects user's position and loads forecast =====
    geolocateButton.addEventListener("click", () => {
      if (!navigator.geolocation) {
        state.textContent = t("error", { error: "Geolocation not available" });
        return;
      }
      state.textContent = t("loadingLocation");
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          currentCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
          loadForecastByCoords(pos.coords.latitude, pos.coords.longitude, "My Location");
        },
        (err) => { state.textContent = t("error", { error: err.message }); }
      );
    });

    // ===== Event listener: Language selector – switches language and reloads forecast =====
    languageSelect.addEventListener("change", (e) => {
      currentLang = e.target.value;
      localStorage.setItem("language", currentLang);
      languageSelect.value = currentLang;
      updateUIText();
      if (cityInput.value.trim()) {
        loadForecast();
      }
    });

    // ===== Event listeners: Reload button and city input (autocomplete + Enter key) =====
    reloadButton.addEventListener("click", loadForecast);
    cityInput.addEventListener("input", () => {
      const query = cityInput.value.trim();
      if (query.length < 2) {
        cityList.innerHTML = "";
        return;
      }

      clearTimeout(cityAutocompleteTimer);
      cityAutocompleteTimer = setTimeout(async () => {
        const suggestions = await fetchCitySuggestions(query);
        updateCityDatalist(suggestions);
      }, 280);
    });
    cityInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") loadForecast();
    });
    cityInput.addEventListener("change", loadForecast);

    // ===== Initialization: apply saved theme, set language, update UI =====
    initTheme();
    languageSelect.value = currentLang;
    updateUIText();
    
    // ===== Auto-load: try geolocation on first visit, fall back to last city or London =====
    if (navigator.geolocation && !localStorage.getItem("autoGeolocated")) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          localStorage.setItem("autoGeolocated", "true");
          currentCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
          loadForecastByCoords(pos.coords.latitude, pos.coords.longitude, "My Location");
        },
        (err) => {
          console.log("Geolocation failed, loading default city");
          const lastCity = localStorage.getItem("lastCity") || "London";
          cityInput.value = lastCity;
          loadForecast();
        }
      );
    } else {
      const lastCity = localStorage.getItem("lastCity") || "London";
      cityInput.value = lastCity;
      loadForecast();
    }
  </script>
</body>
</html>
